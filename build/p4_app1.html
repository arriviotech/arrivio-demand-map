<script>
(function () {
  'use strict';
  /* ============ helpers ============ */
  const $ = id => document.getElementById(id);
  const NF = new Intl.NumberFormat('de-DE');
  const fmt = n => NF.format(Math.round(n));
  const kfmt = n => n >= 1000 ? NF.format(Math.round(n / 100) / 10) + 'k' : fmt(n);
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const MOBILE = () => matchMedia('(max-width: 640px)').matches;
  function hav(a, b) {
    const R = 6371, r = x => x * Math.PI / 180;
    const dLa = r(b[0] - a[0]), dLn = r(b[1] - a[1]);
    const s = Math.sin(dLa / 2) ** 2 + Math.cos(r(a[0])) * Math.cos(r(b[0])) * Math.sin(dLn / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }
  const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };
  const throttle = (fn, ms) => { let last = 0, t; return (...a) => { const now = Date.now(); if (now - last >= ms) { last = now; fn(...a); } else { clearTimeout(t); t = setTimeout(() => { last = Date.now(); fn(...a); }, ms - (now - last)); } }; };
  const RAMP = ['#4b2991', '#872ca2', '#c0369d', '#ea4f88', '#fa7876', '#f6a97a', '#edd9a3'];
  const MODE_COLOR = { 'bike-share': '#2dd4bf', 'walking': '#a78bfa', 'transit': '#fbbf24' };
  const MODE_LABEL = { 'bike-share': 'bike-share', 'walking': 'walking', 'transit': 'public transport' };
  const REGION = { 'NRW': 'Nordrhein-Westfalen', 'NRW+Lower Saxony': 'Nordrhein-Westfalen', 'NRW, Berlin': 'Nordrhein-Westfalen', 'Bavaria': 'Bayern', 'Berlin': 'Berlin', 'Bremen': 'Bremen', 'Saxony': 'Sachsen', 'Baden-Württember': 'Baden-Württemberg', 'multiple cities': '' };
  const CHAIN_COLOR = () => ({ GCH: cssVar('--gch'), Seminaris: cssVar('--sem') });
  const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

  /* ============ state ============ */
  const S = {
    theme: localStorage.getItem('arrivio.theme') || 'dark',
    base: 'voyager',
    stateMetric: 'intl', stateMulti: false, selStates: [],
    commMetric: 'density', hotelMetric: 'rooms', inflowMetric: 'total', propDeal: 'all',
    layers: { hex: true, clients: true, labels: true, approx: true, gch: true, sem: true, stations: false, commercial: false, hotels: false, inflow: false, props: false },
    reach: { mode: 'bike-share', min: 20, origin: null, active: false },
    sel: null, selArea: null, armed: false,
    areas: []   // {id, name, km}
  };
  let areaSeq = 0;
  const nextName = () => String.fromCharCode(65 + (areaSeq++ % 26));

  /* ============ URL hash state ============ */
  function writeHashNow() {
    const parts = ['v=1'];
    const A = M.getAreas();
    if (A.length) parts.push('areas=' + A.map(a => `${a.lat.toFixed(4)},${a.lng.toFixed(4)},${a.km},${encodeURIComponent(a.name)}`).join(';'));
    parts.push('base=' + S.base);
    const off = Object.keys(S.layers).filter(k => !S.layers[k]);
    if (off.length) parts.push('off=' + off.join(','));
    history.replaceState(null, '', '#' + parts.join('&'));
  }
  const writeHash = debounce(writeHashNow, 500);
  function parseHash() {
    const out = { areas: [], base: null, off: [] };
    const h = location.hash.replace(/^#/, '');
    if (!h) return out;
    for (const kv of h.split('&')) {
      const i = kv.indexOf('='); if (i < 0) continue;
      const k = kv.slice(0, i), v = kv.slice(i + 1);
      if (k === 'areas') v.split(';').forEach(s => {
        const p = s.split(','); const lat = +p[0], lng = +p[1], km = +p[2] || 50;
        if (isFinite(lat) && isFinite(lng)) out.areas.push({ lat, lng, km, name: decodeURIComponent(p[3] || '') });
      });
      if (k === 'base') out.base = v;
      if (k === 'off') out.off = v.split(',');
    }
    return out;
  }

  /* ============ theme ============ */
  function applyTheme(t, swapBase) {
    S.theme = t;
    document.documentElement.dataset.theme = t;
    localStorage.setItem('arrivio.theme', t);
    $('btn-theme').querySelector('use').setAttribute('href', t === 'dark' ? '#i-sun' : '#i-moon');
    const meta = document.querySelector('meta[name=theme-color]');
    if (meta) meta.content = t === 'dark' ? '#16191f' : '#ffffff';
    if (swapBase) {
      if (t === 'light' && S.base === 'dark') setBase('voyager');
      else if (t === 'dark' && (S.base === 'voyager' || S.base === 'positron')) setBase('dark');
    }
    renderHotelsNow(); // chain colors are theme-dependent
  }

  /* ============ toasts + live region ============ */
  function toast(msg, kind, action) {
    const stack = $('toasts');
    while (stack.children.length >= 3) stack.firstChild.remove();
    const el = document.createElement('div');
    el.className = 'toast glass' + (kind === 'error' ? ' error' : '');
    el.setAttribute('role', kind === 'error' ? 'alert' : 'status');
    el.innerHTML = `<span>${esc(msg)}</span>`;
    if (action) {
      const b = document.createElement('button'); b.className = 'ta'; b.textContent = action.label;
      b.onclick = () => { el.remove(); action.fn(); };
      el.appendChild(b);
    }
    stack.appendChild(el);
    if (kind !== 'error') setTimeout(() => el.remove(), 3000 + Math.ceil(msg.split(' ').length / 3) * 1000);
    else { const x = document.createElement('button'); x.className = 'ta'; x.textContent = '✕'; x.onclick = () => el.remove(); el.appendChild(x); }
  }
  const announce = m => { $('sr-live').textContent = m; };

  /* ============ count-up ============ */
  function animateNumber(el, to, format) {
    format = format || fmt;
    const from = el._v || 0; el._v = to;
    if (REDUCED || document.hidden || Math.abs(to - from) < 2) { el.textContent = format(to); return; }
    const t0 = performance.now();
    const step = now => {
      const t = Math.min(1, (now - t0) / 400), e = 1 - Math.pow(1 - t, 3);
      el.textContent = format(from + (to - from) * e);
      if (t < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  /* ============ data calc ============ */
  const located = c => c.precision === 'exact' || c.precision === 'city' || c.precision === 'district';
  const styleOf = c => ({ color: cssVar('--client'), radiusPx: Math.max(5, Math.min(26, 4 + Math.sqrt(Math.max(0, c.rooms_mid)) * 2.1)) * (M.sizeScale || 1), exact: located(c) });
  const shortName = n => n.length > 30 ? n.slice(0, 28) + '…' : n;
  const labelOf = c => esc(shortName(c.name)) + ' · ' + esc(c.rooms_disp);
  function visible() { return CLIENTS.filter(c => S.layers.approx || located(c)); }
  function coverageOf(lat, lng, km, list) {
    let n = 0, rooms = 0;
    list.forEach(c => { if (hav([lat, lng], [c.lat, c.lng]) <= km) { n++; rooms += (c.rooms_mid || 0); } });
    return { n, rooms };
  }
  function combinedCoverage(list) {
    const A = M.getAreas(); const ids = new Set(); let rooms = 0;
    list.forEach(c => { for (const a of A) { if (hav([a.lat, a.lng], [c.lat, c.lng]) <= a.km) { ids.add(c.id); rooms += (c.rooms_mid || 0); break; } } });
    return { n: ids.size, rooms };
  }

  /* ============ render pipeline ============ */
  function renderClientsNow() {
    M.renderClients(visible(), styleOf, selectClient, labelOf);
    if (S.sel && S.sel.type === 'client') M.setSelectedClient(S.sel.id);
  }
  function updateKPIs() {
    const list = visible();
    const rooms = list.reduce((a, c) => a + (c.rooms_mid || 0), 0);
    const cov = combinedCoverage(list);
    const pct = rooms ? Math.round(cov.rooms / rooms * 100) : 0;
    animateNumber($('kpi-clients'), list.length);
    animateNumber($('kpi-rooms'), rooms, n => '≈' + kfmt(n));
    animateNumber($('kpi-cov'), pct, n => Math.round(n) + '%');
    $('kpi-cov-sub').textContent = '≈' + kfmt(cov.rooms) + ' rooms covered';
    $('sum-demand').textContent = fmt(list.length) + ' clients · ≈' + kfmt(rooms) + ' rooms';
    updateOverview(list, cov, rooms);
    updateAreaStats(list);
  }
  function updateOverview(list, cov, totalRooms) {
    const A = M.getAreas();
    const pill = $('ov-pill');
    if (!A.length) {
      pill.innerHTML = `<span class="num"><b>${fmt(list.length)}</b> clients</span><span class="sep"></span><span class="num">≈<b>${kfmt(totalRooms)}</b> rooms</span><span style="color:var(--t3)">· add an area</span>`;
    } else {
      const pct = totalRooms ? Math.round(cov.rooms / totalRooms * 100) : 0;
      pill.innerHTML = `<span class="num"><b>${A.length}</b> area${A.length > 1 ? 's' : ''}</span><span class="sep"></span><span class="num"><b>${fmt(cov.n)}</b> clients</span><span class="sep"></span><span class="num">≈<b>${kfmt(cov.rooms)}</b> rooms</span><span class="sep"></span><span class="num"><b>${pct}%</b> covered</span>`;
    }
    // table
    const rows = A.map(a => ({ a, c: coverageOf(a.lat, a.lng, a.km, list) }));
    const best = { n: Math.max(0, ...rows.map(r => r.c.n)), rooms: Math.max(0, ...rows.map(r => r.c.rooms)) };
    $('ov-table').innerHTML =
      `<tr><th>Area</th><th>Radius</th><th>Clients</th><th>Rooms</th><th>% of rooms</th></tr>` +
      rows.map(r => `<tr><td>${esc(r.a.name)}</td><td class="num">${r.a.km} km</td>` +
        `<td class="num${rows.length > 1 && r.c.n === best.n ? ' win' : ''}">${fmt(r.c.n)}</td>` +
        `<td class="num${rows.length > 1 && r.c.rooms === best.rooms ? ' win' : ''}">≈${kfmt(r.c.rooms)}</td>` +
        `<td class="num">${totalRooms ? Math.round(r.c.rooms / totalRooms * 100) : 0}%</td></tr>`).join('') +
      (rows.length > 1 ? `<tr class="tot"><td>Combined (unique)</td><td></td><td class="num">${fmt(cov.n)}</td><td class="num">≈${kfmt(cov.rooms)}</td><td class="num">${totalRooms ? Math.round(cov.rooms / totalRooms * 100) : 0}%</td></tr>` : '');
  }

  /* ============ hex demand layer ============ */
  let lastHexRes = 0;
  function hexRes() { const z = M.getZoom(); return z <= 5 ? 4 : z <= 7 ? 5 : 6; }
  let demandMaxRooms = 0;
  function computeHex(force) {
    if (typeof h3 === 'undefined') return;
    if (!S.layers.hex || M.getZoom() >= 9) { M.setHexVisible(false); syncClientVisibility(); return; }
    const res = hexRes();
    if (!force && res === lastHexRes && M.hexL) { M.setHexVisible(true); syncClientVisibility(); return; }
    lastHexRes = res;
    const cells = {};
    visible().forEach(c => {
      try { const cell = h3.latLngToCell(c.lat, c.lng, res); cells[cell] = (cells[cell] || 0) + (c.rooms_mid || 0); } catch (e) { }
    });
    const vals = Object.values(cells);
    if (!vals.length) { M.clearHex(); return; }
    const max = Math.max(...vals);
    demandMaxRooms = max; updateLegend();
    const out = Object.entries(cells).map(([cell, v]) => {
      const t = Math.sqrt(v / max);
      const color = rampColor(t);
      return { boundary: h3.cellToBoundary(cell), color, v };
    });
    M.renderHex(out);
    M.setHexVisible(true);
    syncClientVisibility();
  }
  function syncClientVisibility() {
    const hexShowing = S.layers.hex && M.getZoom() < 9;
    M.setClientsVisible(S.layers.clients && !hexShowing);
  }

  /* ============ areas ============ */
  function addAreaAt(ll, km, name, silent) {
    name = name || ('Area ' + nextName());
    km = km || 50;
    const id = M.addArea(ll[0], ll[1], km, name);
    S.areas.push({ id, name, km });
    renderAreaList();
    updateKPIs();
    writeHash();
    if (!silent) { announce(name + ' added'); selectArea(id); }
    return id;
  }
  function areaRowHTML(a, stats) {
    return `<div class="top"><span class="dot"></span><input class="aname" value="${esc(a.name)}" aria-label="Area name" maxlength="24">
      <div class="acts">
        <button class="abtn fly" title="Zoom to area" aria-label="Zoom to ${esc(a.name)}"><svg class="ic" style="width:15px;height:15px"><use href="#i-fit"/></svg></button>
        <button class="abtn reach" title="Reachability from here" aria-label="Reach from ${esc(a.name)}"><svg class="ic" style="width:15px;height:15px"><use href="#i-reach"/></svg></button>
        <button class="abtn danger del" title="Remove area" aria-label="Remove ${esc(a.name)}"><svg class="ic" style="width:15px;height:15px"><use href="#i-trash"/></svg></button>
      </div></div>
      <div class="stats num">${stats}</div>
      <div class="rrow"><input type="range" class="arad" min="10" max="200" step="5" value="${a.km}" aria-label="Radius of ${esc(a.name)}"><output class="num">${a.km} km</output></div>`;
  }
  function areaStatsText(a, list) {
    const ll = M.areaLatLng(a.id); if (!ll) return '';
    const c = coverageOf(ll[0], ll[1], a.km, list);
    return `<b>${fmt(c.n)} clients</b> · ≈${kfmt(c.rooms)} rooms in ${a.km} km`;
  }
  function renderAreaList() {
    const list = visible();
    const ul = $('area-list');
    $('area-empty').hidden = S.areas.length > 0;
    $('sum-areas').textContent = S.areas.length ? S.areas.length + ' area' + (S.areas.length > 1 ? 's' : '') : 'none';
    ul.innerHTML = '';
    S.areas.forEach(a => {
      const li = document.createElement('li');
      li.className = 'arow' + (S.selArea === a.id ? ' sel' : '');
      li.dataset.id = a.id;
      li.innerHTML = areaRowHTML(a, areaStatsText(a, list));
      const name = li.querySelector('.aname');
      name.onchange = () => { a.name = name.value.trim() || a.name; name.value = a.name; M.setAreaName(a.id, a.name); updateKPIs(); writeHash(); };
      li.querySelector('.fly').onclick = () => { const ll = M.areaLatLng(a.id); if (ll) M.flyTo(ll, Math.max(M.getZoom(), 9), REDUCED); selectArea(a.id); };
      li.querySelector('.reach').onclick = () => { setReachOrigin({ type: 'area', id: a.id }); runReach(); };
      li.querySelector('.del').onclick = () => removeAreaWithUndo(a.id);
      const rad = li.querySelector('.arad'), out = li.querySelector('.rrow output');
      rad.oninput = () => { a.km = +rad.value; out.textContent = a.km + ' km'; M.setAreaRadius(a.id, a.km); throttledKPIs(); if (S.selArea === a.id) throttledAreaCard(a.id); writeHash(); };
      li.onclick = e => { if (e.target.closest('button,input')) return; selectArea(a.id); };
      ul.appendChild(li);
    });
  }
  function updateAreaStats(list) {
    list = list || visible();
    document.querySelectorAll('#area-list .arow').forEach(li => {
      const a = S.areas.find(x => x.id === +li.dataset.id);
      if (a) li.querySelector('.stats').innerHTML = areaStatsText(a, list);
    });
  }
  const throttledKPIs = throttle(updateKPIs, 120);
  const throttledAreaCard = throttle(id => { if (S.selArea === id) selectArea(id); }, 130); // keep the open area card in sync while dragging its radius
  function removeAreaWithUndo(id) {
    const a = S.areas.find(x => x.id === id); if (!a) return;
    const ll = M.areaLatLng(id);
    M.removeArea(id);
    S.areas = S.areas.filter(x => x.id !== id);
    if (S.selArea === id) { S.selArea = null; closeSel(); }
    renderAreaList(); updateKPIs(); writeHash();
    toast(a.name + ' removed', 'info', { label: 'Undo', fn: () => addAreaAt(ll, a.km, a.name) });
  }
  function selectArea(id) {
    M.closeInfo();
    if (S.selArea) M.setAreaSelected(S.selArea, false);
    S.selArea = id; S.sel = null; M.setSelectedClient(null);
    M.setAreaSelected(id, true);
    document.querySelectorAll('#area-list .arow').forEach(li => li.classList.toggle('sel', +li.dataset.id === id));
    const a = S.areas.find(x => x.id === id); if (!a) return;
    setReachOrigin({ type: 'area', id });
    const list = visible(); const ll = M.areaLatLng(id);
    const c = coverageOf(ll[0], ll[1], a.km, list);
    const hotels = HOTELS.filter(h => hav(ll, [h.lat, h.lng]) <= a.km).length;
    showSelCard(`
      <div class="sname">${esc(a.name)}</div>
      <div class="splace">Proposed Arrivio location · ${a.km} km radius</div>
      <table>
        <tr><td>Clients</td><td class="num"><b>${fmt(c.n)}</b></td></tr>
        <tr><td>Rooms</td><td class="num"><b style="color:var(--acct)">≈${kfmt(c.rooms)}</b></td></tr>
        <tr><td>Partner hotels</td><td class="num">${hotels}</td></tr>
      </table>
      <div class="btnrow">
        <button class="btn primary" id="sc-reach">Reachability</button>
        <button class="btn" id="sc-del">Remove</button>
      </div>`);
    $('sc-reach').onclick = () => runReach();
    $('sc-del').onclick = () => removeAreaWithUndo(id);
  }

  /* ============ selection card ============ */
  function showSelCard(html) {
    const el = $('sel-card');
    el.innerHTML = `<button class="ibtn close" aria-label="Close"><svg class="ic"><use href="#i-x"/></svg></button>` + html;
    el.hidden = false;
    el.querySelector('.close').onclick = closeSel;
    if (MOBILE()) sheetTo('half');
    $('panel-body').scrollTop = 0;
  }
  function closeSel() {
    M.closeInfo();
    $('sel-card').hidden = true;
    if (S.sel && S.sel.type === 'client') M.setSelectedClient(null);
    if (S.selArea) { M.setAreaSelected(S.selArea, false); document.querySelectorAll('#area-list .arow.sel').forEach(li => li.classList.remove('sel')); }
    if (S.selStates.length) { S.selStates = []; S.stateMulti = false; M.clearStateSelection(); }
    S.sel = null; S.selArea = null; S.selInflow = null;
  }
  function selectClient(c) {
    S.sel = { type: 'client', id: c.id }; S.selArea = null;
    setReachOrigin({ type: 'client', id: c.id });
    const A = M.getAreas();
    let nearest = null;
    A.forEach(a => { const d = hav([a.lat, a.lng], [c.lat, c.lng]); if (!nearest || d < nearest.d) nearest = { d, name: a.name }; });
    const ap = located(c) ? '' : `<div class="approx">Region-level position — not yet resolved to an exact address.</div>`;
    const html = `
      <div class="sname">${esc(c.name)}</div>
      <div class="splace">${esc(c.place)} · ${esc(c.state)}</div>
      <span class="chip num">Rooms: ${esc(c.rooms_disp)}</span>
      <table>
        <tr><td>Talents / yr</td><td>${esc(c.talents_disp || '—')}</td></tr>
        <tr><td>Needs</td><td>${esc(c.req || '—')}</td></tr>
        ${nearest ? `<tr><td>Nearest area</td><td class="num"><b style="color:var(--acct)">${NF.format(Math.round(nearest.d * 10) / 10)} km</b> · ${esc(nearest.name)}</td></tr>` : ''}
      </table>
      <div class="btnrow">
        <button class="btn primary" data-act="reach">Reachability</button>
        <button class="btn" data-act="area">+ Area here</button>
      </div>${ap}`;
    const wire = root => {
      const rb = root.querySelector('[data-act="reach"]'); if (rb) rb.onclick = () => runReach();
      const ab = root.querySelector('[data-act="area"]'); if (ab) ab.onclick = () => addAreaAt([c.lat, c.lng]);
    };
    if (MOBILE()) { showSelCard(html); wire($('sel-card')); M.setSelectedClient(c.id); }
    else { M.openInfo([c.lat, c.lng], html, wire); M.setSelectedClient(c.id); }
  }
  function selectHotel(h) {
    const html = `
      <div class="sname">${esc(h.name)}</div>
      <div class="splace">${esc(h.city)} · ${esc(h.chain)} partner hotel${h.resolved ? '' : ' · locating…'}</div>
      <div class="btnrow"><button class="btn" data-act="area">+ Area here</button></div>`;
    const wire = root => { const ab = root.querySelector('[data-act="area"]'); if (ab) ab.onclick = () => addAreaAt([h.lat, h.lng]); };
    if (MOBILE()) { showSelCard(html); wire($('sel-card')); }
    else M.openInfo([h.lat, h.lng], html, wire);
  }
  function selectCommercial(c) {
    const est = c.est ? ` · <span style="color:var(--warn)">est: ${esc(c.est)}</span>` : '';
    const html = `
      <div class="sname">${esc(c.city)}</div>
      <div class="splace">Office market${est}</div>
      <table>
        <tr><td>Prime rent</td><td class="num"><b>€${NF.format(c.prime)}</b> /m²·mo</td></tr>
        ${c.avg != null ? `<tr><td>Average rent</td><td class="num">€${NF.format(c.avg)} /m²·mo</td></tr>` : ''}
        <tr><td>Vacancy</td><td class="num">${NF.format(c.vac)}%</td></tr>
        <tr><td>Vacant office space</td><td class="num"><b style="color:var(--acct)">${fmt(c.m2)}</b> m²</td></tr>
      </table>
      <div class="btnrow"><button class="btn" data-act="area">+ Area here</button></div>`;
    const wire = root => { const ab = root.querySelector('[data-act="area"]'); if (ab) ab.onclick = () => addAreaAt([c.lat, c.lng]); };
    if (MOBILE()) { showSelCard(html); wire($('sel-card')); }
    else M.openInfo([c.lat, c.lng], html, wire);
  }
  // shared hex aggregation for the OSM density layers (light = less, dark = more)
  function aggHex(points, res) { const cells = {}; for (const p of points) { try { const c = h3.latLngToCell(p[0], p[1], res); cells[c] = (cells[c] || 0) + p[2]; } catch (e) { } } return cells; }
  // clip the hex heatmaps to Germany by cell centre — basemap (neighbours) stays visible, only our data is DE-only
  const _DErings = (typeof DE_OUTLINE !== 'undefined' && DE_OUTLINE) ? DE_OUTLINE.coordinates.map(p => p[0]) : null;
  function inGermany(lat, lng) { if (!_DErings) return true; for (const ring of _DErings) { let c = false; for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) { const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1]; if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) c = !c; } if (c) return true; } return false; }
  const _inDE = c => { const ll = h3.cellToLatLng(c); return inGermany(ll[0], ll[1]); };

  const stateInflow = (name, metric) => metric === 'total' ? stateTotal(name) : stateIntl(name);
  const stateTAM = (name, metric) => stateInflow(name, metric) * TAM_PER_PERSON;
  const statesValueFn = () => (name => stateTAM(name, S.stateMetric));
  const stateLabelFn = () => (name => esc(STATE_SHORT[name] || name)); // name only — keeps labels compact, no overlap
  const statesFillOpacity = () => ((S.layers.clients || S.layers.hex || S.layers.commercial || S.layers.hotels) ? 0.32 : 0.8);
  /* ---- in-migration OVERLAY — DISTRICT (Kreis) choropleth, mixable with point layers ----
     Destatis Regionalstatistik 12711 (2024): GROSS arrivals (Zuzüge über die Kreisgrenzen) — the
     number of people who MOVED INTO each district = domestic city-to-city + international, absolute.
     (Replaces the old INKAR net saldo, which understated cities; this is the addressable-audience metric.) */
  const KREIS = {}; (INFLOW_KREISE || []).forEach(r => { KREIS[r.ags] = r; });
  const _inflowFld = m => (m === 'foreign' ? 'auslaender' : 'total');
  const INFLOW_CAP = {};
  ['total', 'foreign'].forEach(m => { const f = _inflowFld(m); const v = (INFLOW_KREISE || []).map(r => r[f]).filter(x => typeof x === 'number' && x > 0).sort((a, b) => a - b); INFLOW_CAP[m] = v.length ? v[Math.floor(v.length * 0.95)] : 1; });
  const inflowField = () => _inflowFld(S.inflowMetric);
  function inflowColor(f) {
    const r = KREIS[f.properties.AGS], v = r ? r[inflowField()] : null;
    if (v == null) return '#e9e6ee';
    return rampColor(Math.min(1, Math.max(0, v) / (INFLOW_CAP[S.inflowMetric === 'foreign' ? 'foreign' : 'total'] || 1)));
  }
  function inflowTip(f) {
    const r = KREIS[f.properties.AGS]; if (!r) return esc(f.properties.GEN || 'Kreis');
    return esc(r.name) + ' · ' + NF.format(r[inflowField()]) + (S.inflowMetric === 'foreign' ? ' foreign' : '') + ' arrivals/yr';
  }
  function computeInflow() {
    if (!S.layers.inflow) { M.hideInflow(); return; }
    M.renderInflow({ geo: DE_KREISE_GEO, colorFn: inflowColor, tipFn: inflowTip, onClick: f => selectInflowRegion(f.properties.AGS), fillOpacity: 0.62 });
    M.setInflowClickable(!S.armed);
  }
  function setInflowMetric(metric) {
    S.inflowMetric = metric;
    document.querySelectorAll('#inflow-metric [data-im], #ic-metric [data-im]').forEach(x => x.setAttribute('aria-pressed', x.dataset.im === metric));
    if (S.layers.inflow) { computeInflow(); updateLegend(); }
    if (S.selInflow) selectInflowRegion(S.selInflow);
  }
  function selectInflowRegion(ags) {
    const r = KREIS[ags]; if (!r) return;
    S.selInflow = ags;
    const isF = S.inflowMetric === 'foreign', share = r.total ? Math.round(r.auslaender / r.total * 100) : null;
    showSelCard(`
      <div class="sname">${esc(r.name)}</div>
      <div class="splace">People moving in · gross arrivals (Zuzüge), 2024</div>
      <div class="seg" id="ic-metric" role="group" aria-label="Inflow metric" style="margin:2px 0 10px">
        <button data-im="total" aria-pressed="${!isF}">All arrivals</button>
        <button data-im="foreign" aria-pressed="${isF}">Foreign nat.</button>
      </div>
      <table>
        <tr><td><b>${isF ? 'Foreign-national' : 'Total'} arrivals / yr</b></td><td class="num"><b style="color:var(--acct);font-size:1.15em">${NF.format(isF ? r.auslaender : r.total)}</b></td></tr>
        <tr><td style="color:var(--t3)">· total (incl. domestic)</td><td class="num" style="color:var(--t2)">${NF.format(r.total)}</td></tr>
        <tr><td style="color:var(--t3)">· foreign nationals</td><td class="num" style="color:var(--t2)">${NF.format(r.auslaender)}</td></tr>
        <tr><td style="color:var(--t3)">· German nationals</td><td class="num" style="color:var(--t2)">${NF.format(r.deutsche)}</td></tr>
        ${share != null ? `<tr><td>Foreign share of arrivals</td><td class="num">${share}%</td></tr>` : ''}
      </table>
      <p class="hint" style="margin-top:8px">Gross in-migration across the district border — domestic city-to-city + international combined, 2024. The real addressable audience. Source: Destatis Regionalstatistik 12711.</p>
      <p class="hint" style="margin-top:4px">"Foreign nat." counts arrivals who are foreign nationals (nationality, not origin).</p>`);
    document.querySelectorAll('#ic-metric [data-im]').forEach(b => b.onclick = () => setInflowMetric(b.dataset.im));
  }
  function setStateMetric(metric) {
    S.stateMetric = metric;
    document.querySelectorAll('#state-metric [data-metric], #card-metric [data-metric]').forEach(x => x.setAttribute('aria-pressed', x.dataset.metric === metric));
    if (S.base === 'states') { M.restyleStates(statesValueFn(), stateLabelFn(), statesFillOpacity()); updateStatesLegend(); }
    if (S.selStates.length) renderStateCard();
  }
  function selectState(name) {
    if (!STATES_DATA[name]) return;
    if (S.stateMulti) { const i = S.selStates.indexOf(name); if (i >= 0) S.selStates.splice(i, 1); else S.selStates.push(name); }
    else S.selStates = [name];
    M.setSelectedStates(S.selStates);
    if (S.selStates.length) renderStateCard(); else closeSel();
  }
  function renderStateCard() {
    const metric = S.stateMetric, isT = metric === 'total';
    const seg = `<div class="seg" id="card-metric" role="group" aria-label="Inflow basis" style="margin:2px 0 10px">
        <button data-metric="intl" aria-pressed="${!isT}">International</button>
        <button data-metric="total" aria-pressed="${isT}">+ Domestic</button></div>`;
    const multiBtn = `<button class="btn" id="state-multi" aria-pressed="${S.stateMulti}" style="width:100%;margin-top:8px">${S.stateMulti ? '✓ Comparing — click states to add/remove' : '+ Compare multiple states'}</button>`;
    let html;
    if (S.selStates.length > 1) {
      const sorted = S.selStates.slice().sort((a, b) => stateTAM(b, metric) - stateTAM(a, metric));
      const total = sorted.reduce((s, n) => s + stateTAM(n, metric), 0);
      const rows = sorted.map(n => `<tr><td>${esc(STATE_SHORT[n] || n)}</td><td class="num">${eurShort(stateTAM(n, metric))}</td></tr>`).join('');
      html = `
        <div class="sname">${S.selStates.length} states · combined TAM</div>
        <div class="splace">${isT ? 'Total (incl. domestic)' : 'International'} inflow · €${TAM_PER_PERSON / 1000}k per person</div>
        ${seg}
        <table>
          <tr><td><b>Combined TAM</b></td><td class="num"><b style="color:var(--acct);font-size:1.18em">${eurShort(total)}</b></td></tr>
          ${rows}
        </table>
        ${multiBtn}
        <p class="hint" style="margin-top:8px">Click states on the map to add or remove. TAM = inflow × €${TAM_PER_PERSON / 1000}k.</p>`;
    } else {
      const name = S.selStates[0], d = STATES_DATA[name];
      const tam = stateTAM(name, metric), intlTAM = stateIntl(name) * TAM_PER_PERSON, totTAM = stateTotal(name) * TAM_PER_PERSON;
      const comp = INFLOW_COMPOSITION.map(c => `${c.label} ${c.pct}%`).join(' · ');
      let rows = `<tr><td>Population</td><td class="num">${fmt(d.pop)}</td></tr>
        <tr><td>Inflow / yr (${isT ? 'total' : 'international'})</td><td class="num">${fmt(stateInflow(name, metric))}</td></tr>
        <tr><td><b>TAM · ${isT ? '+ domestic' : 'international'}</b></td><td class="num"><b style="color:var(--acct);font-size:1.15em">${eurShort(tam)}</b></td></tr>`;
      if (isT) rows += `<tr><td style="color:var(--t3)">· of which international</td><td class="num" style="color:var(--t2)">${eurShort(intlTAM)}</td></tr>
        <tr><td style="color:var(--t3)">· of which domestic</td><td class="num" style="color:var(--t2)">${eurShort(totTAM - intlTAM)}</td></tr>`;
      html = `
        <div class="sname">${esc(name)}</div>
        <div class="splace">Total Addressable Market · €${TAM_PER_PERSON / 1000}k per person</div>
        ${seg}
        <table>${rows}</table>
        ${multiBtn}
        <p class="hint" style="margin-top:8px">National inflow mix: ${esc(comp)}.</p>
        <p class="hint" style="margin-top:4px">Top origins: ${esc(INFLOW_TOP_ORIGINS)}. TAM = inflow × €${TAM_PER_PERSON / 1000}k. Source: Destatis 2024.</p>`;
    }
    showSelCard(html);
    document.querySelectorAll('#card-metric [data-metric]').forEach(b => b.onclick = () => setStateMetric(b.dataset.metric));
    const mb = document.getElementById('state-multi');
    if (mb) mb.onclick = () => { S.stateMulti = !S.stateMulti; renderStateCard(); };
  }
